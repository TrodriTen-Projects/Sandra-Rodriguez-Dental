version: 2
updates:
  # npm dependencies — keeps Next.js, React, etc. patched.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk minor/patch bumps into a single PR to cut noise.
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  # Keep the GitHub Actions used in the workflows up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
